<svg xmlns="http://www.w3.org/2000/svg" width="860" height="200" viewBox="0 0 860 200" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111722"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <style>
      @keyframes countUp {
        from { stroke-dashoffset: 301.6; }
        to { stroke-dashoffset: 231.4; }
      }
      @keyframes barEasy { from { width: 0; } to { width: 92.7px; } }
      @keyframes barMed { from { width: 0; } to { width: 65.5px; } }
      @keyframes barHard { from { width: 0; } to { width: 17.5px; } }
      .ring {
        stroke-dasharray: 301.6;
        stroke-dashoffset: 231.4;
        animation: countUp 1.2s cubic-bezier(.2,.8,.2,1) forwards;
        transform: rotate(-90deg);
        transform-origin: 90px 115px;
      }
      .easy-fill { animation: barEasy 1s ease-out forwards; }
      .med-fill { animation: barMed 1.1s ease-out forwards; }
      .hard-fill { animation: barHard 1.2s ease-out forwards; }
    </style>
  </defs>

  <rect width="860" height="200" rx="12" fill="url(#lbg)"/>
  <rect x="0.5" y="0.5" width="859" height="199" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>
  
  <!-- Title bar -->
  <line x1="0" y1="30" x2="860" y2="30" stroke="#30363d"/>
  <circle cx="20" cy="15" r="5" fill="#ff5f56"/>
  <circle cx="36" cy="15" r="5" fill="#ffbd2e"/>
  <circle cx="52" cy="15" r="5" fill="#27c93f"/>
  <text x="430" y="19" fill="#7d8590" font-size="12" text-anchor="middle">raghav@leetcode: ~$ leetcode-cli --stats</text>

  <!-- Left: Circular progress (All solved) -->
  <circle cx="90" cy="115" r="48" fill="none" stroke="#30363d" stroke-width="8"/>
  <circle cx="90" cy="115" r="48" fill="none" stroke="#22d3ee" stroke-width="8" stroke-linecap="round" class="ring"/>
  <text x="90" y="112" fill="#c9d1d9" font-size="22" font-weight="700" text-anchor="middle">929</text>
  <text x="90" y="128" fill="#7d8590" font-size="11" text-anchor="middle">/ 3991 Solved</text>

  <!-- Middle: Difficulty Progress Bars -->
  <!-- Easy -->
  <text x="210" y="79" fill="#2ec866" font-size="12" font-weight="700">Easy</text>
  <rect x="270" y="70" width="260" height="10" rx="5" fill="#30363d"/>
  <rect x="270" y="70" width="92.7" height="10" rx="5" fill="#2ec866" class="easy-fill"/>
  <text x="550" y="79" fill="#c9d1d9" font-size="12" font-weight="700">340<tspan fill="#7d8590" font-weight="400">/954</tspan></text>

  <!-- Medium -->
  <text x="210" y="119" fill="#fea116" font-size="12" font-weight="700">Medium</text>
  <rect x="270" y="110" width="260" height="10" rx="5" fill="#30363d"/>
  <rect x="270" y="110" width="65.5" height="10" rx="5" fill="#fea116" class="med-fill"/>
  <text x="550" y="119" fill="#c9d1d9" font-size="12" font-weight="700">525<tspan fill="#7d8590" font-weight="400">/2084</tspan></text>

  <!-- Hard -->
  <text x="210" y="159" fill="#f25f5c" font-size="12" font-weight="700">Hard</text>
  <rect x="270" y="150" width="260" height="10" rx="5" fill="#30363d"/>
  <rect x="270" y="150" width="17.5" height="10" rx="5" fill="#f25f5c" class="hard-fill"/>
  <text x="550" y="159" fill="#c9d1d9" font-size="12" font-weight="700">64<tspan fill="#7d8590" font-weight="400">/953</tspan></text>

  <!-- Right: Stats Panel -->
  <line x1="620" y1="45" x2="620" y2="185" stroke="#30363d" stroke-dasharray="3,3"/>
  
  <!-- Global Rank -->
  <g transform="translate(645, 55)">
    <text x="0" y="20" fill="#7d8590" font-size="12">Global Rank</text>
    <text x="0" y="44" fill="#f2cc60" font-size="20" font-weight="700">#40,567</text>
  </g>

  <!-- Streak -->
  <g transform="translate(645, 120)">
    <text x="0" y="20" fill="#7d8590" font-size="12">Active Streak</text>
    <text x="0" y="44" fill="#fea116" font-size="20" font-weight="700">366 Days 🔥</text>
  </g>
</svg>
